<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>每日演讲</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="assets/style.css?v=3" />
  </head>
  <body>
    <main id="app">
      <header>
        <h1>每日演讲</h1>
        <p class="subtitle">为讲口才而生 · 每日清晨 06:30 自动更新</p>
      </header>
      <section id="search-bar">
        <input
          id="search-input"
          type="search"
          placeholder="搜索历史演讲稿（标题、日期、正文关键字）"
          autocomplete="off"
          spellcheck="false"
        />
        <p id="search-status" class="search-status" aria-live="polite"></p>
      </section>
      <section id="collection-bar" aria-label="合集筛选"></section>
      <section id="speeches" aria-live="polite"></section>
      <footer>
        <p>
          为讲口才而生 · 每日清晨 06:30 自动更新 ·
          <a href="https://github.com/Jmiles129250/daily-speech" target="_blank" rel="noopener"
            >仓库地址</a
          >
        </p>
      </footer>
    </main>
    <noscript>
      <p style="text-align: center; color: #7a7a7a; padding: 24px">
        本网站需要启用 JavaScript 才能浏览。
      </p>
    </noscript>
    <script src="assets/app.js?v=3" defer></script>
  </body>
</html>
