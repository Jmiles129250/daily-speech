name: Generate Daily Speech

on:
  schedule:
    # 22:30 UTC = 06:30 Beijing (Asia/Shanghai, UTC+8)
    - cron: "30 22 * * *"
  workflow_dispatch:

permissions:
  contents: write
  actions: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Always start from the latest main; if the previous run's commit
          # is stale, this refreshes it before we generate.
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Generate today's speech
        env:
          LLM_API_KEY: ${{ secrets.github }}
          LLM_API_BASE: ${{ secrets.LLM_API_BASE || 'https://api.MiniMax.chat/v1' }}
          LLM_MODEL: ${{ vars.LLM_MODEL || 'MiniMax-M2.5' }}
        run: python scripts/generate_speech.py

      - name: Build index
        run: python scripts/build_index.py

      - name: Commit speech files
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          file_pattern: "speeches/**"
          commit_message: "speech: ${{ github.event.head_commit.message }}"

      - name: Notify WeChat (Server 酱 or WeCom bot)
        if: always() && success()
        env:
          WECHAT_SENDKEY: ${{ secrets.WECHAT_SENDKEY }}
          WECHAT_WEBHOOK: ${{ secrets.WECHAT_WEBHOOK }}
        run: python scripts/notify.py

      - name: Trigger Pages deploy
        if: success()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # After the generate job commits + pushes the new speech, dispatch
          # the deploy workflow so Pages redeploys. We do this explicitly
          # (rather than relying on a 'push' trigger on deploy.yml) because
          # GitHub's push-event routing has been observed to skip newly-added
          # workflows for the very push that registered them.
          curl -s -X POST \
            -H "Authorization: token ${GH_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            -d '{"ref":"main"}' \
            "${GITHUB_API_URL}/repos/${GITHUB_REPOSITORY}/actions/workflows/deploy.yml/dispatches"
          echo "deploy workflow dispatched"

